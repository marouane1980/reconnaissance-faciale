<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconnaissance Faciale</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">&#128248; Reconnaissance Faciale</span>
      <span class="badge" id="faceCount">0 personne(s)</span>
    </div>
  </header>

  <main>
    <section class="video-wrap">
      <img id="videoFeed" src="/video_feed" alt="Flux vidéo">
    </section>

    <aside class="sidebar">

      <!-- Ajouter une personne -->
      <div class="card">
        <h2>Ajouter une personne</h2>

        <!-- Étape 0 : formulaire -->
        <div id="formStep">
          <label for="nameInput">Nom complet</label>
          <input type="text" id="nameInput" placeholder="Ex : Marouane Mez" autocomplete="off">
          <button id="startBtn" onclick="startWizard()">&#128247; Commencer la capture</button>
          <div id="statusMsg" class="status-msg"></div>
        </div>

        <!-- Étape 1-5 : wizard -->
        <div id="wizardStep" style="display:none">
          <div class="wizard-name" id="wizardName"></div>

          <div class="progress-dots" id="progressDots"></div>

          <div class="profile-card">
            <div class="profile-icon" id="profileIcon"></div>
            <div class="profile-label" id="profileLabel"></div>
          </div>

          <div class="countdown-wrap">
            <svg class="countdown-ring" viewBox="0 0 60 60">
              <circle cx="30" cy="30" r="26" class="ring-bg"/>
              <circle cx="30" cy="30" r="26" class="ring-fg" id="ringFg"/>
            </svg>
            <span class="countdown-num" id="countdownNum">3</span>
          </div>

          <div id="wizardMsg" class="status-msg"></div>
          <button class="cancel-btn" onclick="cancelWizard()">✕ Annuler</button>
        </div>
      </div>

      <!-- Seuil de confiance -->
      <div class="card">
        <h2>Seuil de confiance</h2>
        <div class="threshold-row">
          <span class="th-label">Strict</span>
          <input type="range" id="thresholdSlider" min="0.1" max="0.9" step="0.01" value="0.363">
          <span class="th-label">Souple</span>
        </div>
        <div class="threshold-value">Seuil : <strong id="thresholdVal">0.363</strong></div>
        <button id="thresholdBtn" onclick="applyThreshold()">Appliquer</button>
        <div id="thresholdMsg" class="status-msg"></div>
      </div>

      <!-- Personnes enregistrées -->
      <div class="card">
        <h2>Personnes enregistrées</h2>
        <ul id="faceList"><li class="empty">Chargement...</li></ul>
      </div>

    </aside>
  </main>

  <script>
    const PROFILES = [
      { icon: '👁️',  label: 'Regardez <strong>droit devant</strong> la caméra' },
      { icon: '↙️',  label: 'Tournez <strong>légèrement à gauche</strong>' },
      { icon: '↘️',  label: 'Tournez <strong>légèrement à droite</strong>' },
      { icon: '⬆️',  label: 'Levez <strong>légèrement le menton</strong>' },
      { icon: '⬇️',  label: 'Baissez <strong>légèrement le menton</strong>' },
    ];
    const TOTAL = PROFILES.length;
    const COUNTDOWN = 3;

    let wizardName = '';
    let currentStep = 0;
    let countdownTimer = null;
    let countdownVal = COUNTDOWN;

    // ── Progress dots ──
    function renderDots(active) {
      const el = document.getElementById('progressDots');
      el.innerHTML = PROFILES.map((_, i) =>
        `<span class="dot ${i < active ? 'done' : i === active ? 'active' : ''}"></span>`
      ).join('');
    }

    // ── Wizard ──
    function startWizard() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) { setStatus('Entrez un nom complet.', 'error'); return; }
      wizardName = name;
      currentStep = 0;
      document.getElementById('formStep').style.display = 'none';
      document.getElementById('wizardStep').style.display = 'block';
      document.getElementById('wizardName').textContent = wizardName;
      runStep();
    }

    function runStep() {
      const p = PROFILES[currentStep];
      document.getElementById('profileIcon').textContent = p.icon;
      document.getElementById('profileLabel').innerHTML = p.label;
      document.getElementById('wizardMsg').textContent = '';
      document.getElementById('wizardMsg').className = 'status-msg';
      renderDots(currentStep);
      startCountdown();
    }

    function startCountdown() {
      countdownVal = COUNTDOWN;
      updateRing(countdownVal);
      document.getElementById('countdownNum').textContent = countdownVal;
      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        countdownVal--;
        document.getElementById('countdownNum').textContent = countdownVal;
        updateRing(countdownVal);
        if (countdownVal <= 0) {
          clearInterval(countdownTimer);
          captureStep();
        }
      }, 1000);
    }

    function updateRing(remaining) {
      const circle = document.getElementById('ringFg');
      const r = 26;
      const circ = 2 * Math.PI * r;
      const progress = remaining / COUNTDOWN;
      circle.style.strokeDasharray = circ;
      circle.style.strokeDashoffset = circ * (1 - progress);
    }

    function captureStep() {
      const step = currentStep + 1;
      const msg = document.getElementById('wizardMsg');
      msg.textContent = 'Capture...';
      msg.className = 'status-msg';

      fetch('/capture_profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: wizardName, step, total: TOTAL })
      })
        .then(r => r.json())
        .then(data => {
          if (!data.success) {
            msg.textContent = data.error || 'Erreur — réessai dans 2s';
            msg.className = 'status-msg error';
            setTimeout(startCountdown, 2000);
            return;
          }
          if (data.done) {
            renderDots(TOTAL);
            msg.textContent = '✓ ' + wizardName + ' enregistré(e) !';
            msg.className = 'status-msg success';
            document.getElementById('nameInput').value = '';
            loadFaces();
            setTimeout(cancelWizard, 2000);
          } else {
            currentStep++;
            runStep();
          }
        })
        .catch(() => {
          msg.textContent = 'Erreur réseau — réessai dans 2s';
          msg.className = 'status-msg error';
          setTimeout(startCountdown, 2000);
        });
    }

    function cancelWizard() {
      clearInterval(countdownTimer);
      document.getElementById('wizardStep').style.display = 'none';
      document.getElementById('formStep').style.display = 'block';
      document.getElementById('wizardMsg').textContent = '';
    }

    function setStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + (type || '');
    }

    // ── Face list ──
    function loadFaces() {
      fetch('/faces')
        .then(r => r.json())
        .then(faces => {
          const list = document.getElementById('faceList');
          const badge = document.getElementById('faceCount');
          badge.textContent = faces.length + ' personne' + (faces.length > 1 ? 's' : '');
          list.innerHTML = '';
          if (faces.length === 0) {
            list.innerHTML = '<li class="empty">Aucune personne enregistrée</li>';
            return;
          }
          faces.forEach(({ name, profiles }) => {
            const li = document.createElement('li');
            li.innerHTML =
              '<span class="avatar">' + name.charAt(0).toUpperCase() + '</span>' +
              '<span class="face-info"><span class="face-name">' + name + '</span>' +
              '<span class="face-profiles">' + profiles + ' profil' + (profiles > 1 ? 's' : '') + '</span></span>' +
              '<button class="del-btn" onclick="deleteFace(\'' + name + '\')">✕</button>';
            list.appendChild(li);
          });
        });
    }

    function deleteFace(name) {
      if (!confirm('Supprimer ' + name + ' ?')) return;
      fetch('/delete_face/' + encodeURIComponent(name), { method: 'DELETE' })
        .then(r => r.json())
        .then(data => { if (data.success) loadFaces(); });
    }

    // ── Threshold ──
    const slider = document.getElementById('thresholdSlider');
    const valDisplay = document.getElementById('thresholdVal');
    slider.addEventListener('input', () => {
      valDisplay.textContent = parseFloat(slider.value).toFixed(2);
    });

    function applyThreshold() {
      const value = parseFloat(slider.value);
      const msg = document.getElementById('thresholdMsg');
      const btn = document.getElementById('thresholdBtn');
      btn.disabled = true;
      fetch('/threshold', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            msg.textContent = '✓ Seuil appliqué : ' + data.threshold.toFixed(2);
            msg.className = 'status-msg success';
          } else {
            msg.textContent = data.error || 'Erreur.';
            msg.className = 'status-msg error';
          }
        })
        .catch(() => { msg.textContent = 'Erreur.'; msg.className = 'status-msg error'; })
        .finally(() => { btn.disabled = false; });
    }

    fetch('/threshold')
      .then(r => r.json())
      .then(data => {
        slider.value = data.threshold;
        valDisplay.textContent = data.threshold.toFixed(2);
      });

    document.getElementById('nameInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') startWizard();
    });

    loadFaces();
  </script>
</body>
</html>
