<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconnaissance Faciale</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">&#128248; Reconnaissance Faciale</span>
      <span class="badge" id="faceCount">0 personne(s)</span>
    </div>
  </header>

  <main>
    <section class="video-section">
      <div class="stats-bar">
        <span class="stat identified">&#10003; Identifiés : <strong id="statIdentified">0</strong></span>
        <span class="stat unknown">&#63; Inconnus : <strong id="statUnknown">0</strong></span>
        <span class="stat total">Total : <strong id="statTotal">0</strong></span>
      </div>
      <div class="video-wrap">
        <img id="videoFeed" src="/video_feed" alt="Flux vidéo">
      </div>
    </section>

    <aside class="sidebar">

      <!-- Ajouter une personne -->
      <div class="card">
        <h2>Ajouter une personne</h2>

        <!-- Formulaire initial -->
        <div id="formStep">
          <label for="nameInput">Nom complet</label>
          <input type="text" id="nameInput" placeholder="Ex : Marouane Mez" autocomplete="off">
          <button class="btn-primary" onclick="startWizard()">&#128247; Commencer la capture</button>
          <div id="statusMsg" class="status-msg"></div>
        </div>

        <!-- Wizard 5 profils -->
        <div id="wizardStep" class="hidden">
          <div class="wizard-name" id="wizardName"></div>
          <div class="progress-dots" id="progressDots"></div>

          <div class="profile-card">
            <div class="profile-icon" id="profileIcon"></div>
            <div class="profile-label" id="profileLabel"></div>
          </div>

          <div class="countdown-bar-wrap">
            <div class="countdown-num" id="countdownNum">3</div>
            <div class="countdown-bar">
              <div class="countdown-fill" id="countdownFill"></div>
            </div>
          </div>

          <div id="wizardMsg" class="status-msg"></div>
          <button class="btn-cancel" onclick="cancelWizard()">✕ Annuler</button>
        </div>
      </div>

      <!-- Seuil de confiance -->
      <div class="card">
        <h2>Seuil de confiance</h2>
        <div class="threshold-row">
          <span class="th-label">Strict</span>
          <input type="range" id="thresholdSlider" min="0.1" max="0.9" step="0.01" value="0.363">
          <span class="th-label">Souple</span>
        </div>
        <div class="threshold-value">Seuil : <strong id="thresholdVal">0.363</strong></div>
        <button class="btn-secondary" onclick="applyThreshold()">Appliquer</button>
        <div id="thresholdMsg" class="status-msg"></div>
      </div>

      <!-- Personnes enregistrées -->
      <div class="card">
        <h2>Personnes enregistrées</h2>
        <ul id="faceList"><li class="empty">Chargement...</li></ul>
      </div>

    </aside>
  </main>

  <script>
    var PROFILES = [
      { icon: '👁️',  label: 'Regardez <strong>droit devant</strong> la caméra' },
      { icon: '↙️',  label: 'Tournez <strong>légèrement à gauche</strong>' },
      { icon: '↘️',  label: 'Tournez <strong>légèrement à droite</strong>' },
      { icon: '⬆️',  label: 'Levez <strong>légèrement le menton</strong>' },
      { icon: '⬇️',  label: 'Baissez <strong>légèrement le menton</strong>' }
    ];
    var TOTAL = PROFILES.length;
    var COUNTDOWN_SEC = 3;

    var wizardName = '';
    var currentStep = 0;
    var countdownTimer = null;
    var countdownVal = COUNTDOWN_SEC;

    function renderDots(done) {
      var html = '';
      for (var i = 0; i < TOTAL; i++) {
        var cls = i < done ? 'dot done' : (i === done ? 'dot active' : 'dot');
        html += '<span class="' + cls + '"></span>';
      }
      document.getElementById('progressDots').innerHTML = html;
    }

    function startWizard() {
      var name = document.getElementById('nameInput').value.trim();
      if (!name) {
        document.getElementById('statusMsg').textContent = 'Entrez un nom complet.';
        document.getElementById('statusMsg').className = 'status-msg error';
        return;
      }
      wizardName = name;
      currentStep = 0;
      document.getElementById('formStep').classList.add('hidden');
      document.getElementById('wizardStep').classList.remove('hidden');
      document.getElementById('wizardName').textContent = wizardName;
      runStep();
    }

    function runStep() {
      var p = PROFILES[currentStep];
      document.getElementById('profileIcon').textContent = p.icon;
      document.getElementById('profileLabel').innerHTML = p.label;
      document.getElementById('wizardMsg').textContent = '';
      document.getElementById('wizardMsg').className = 'status-msg';
      renderDots(currentStep);
      startCountdown();
    }

    function startCountdown() {
      countdownVal = COUNTDOWN_SEC;
      document.getElementById('countdownNum').textContent = countdownVal;
      document.getElementById('countdownFill').style.width = '100%';
      document.getElementById('countdownFill').style.transition = 'none';

      clearInterval(countdownTimer);

      setTimeout(function() {
        document.getElementById('countdownFill').style.transition = 'width ' + COUNTDOWN_SEC + 's linear';
        document.getElementById('countdownFill').style.width = '0%';
      }, 50);

      countdownTimer = setInterval(function() {
        countdownVal--;
        document.getElementById('countdownNum').textContent = countdownVal;
        if (countdownVal <= 0) {
          clearInterval(countdownTimer);
          captureStep();
        }
      }, 1000);
    }

    function captureStep() {
      var step = currentStep + 1;
      var msg = document.getElementById('wizardMsg');
      msg.textContent = 'Capture en cours...';
      msg.className = 'status-msg';

      fetch('/capture_profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: wizardName, step: step, total: TOTAL })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) {
          msg.textContent = data.error || 'Erreur — réessai dans 2s';
          msg.className = 'status-msg error';
          setTimeout(startCountdown, 2000);
          return;
        }
        if (data.done) {
          renderDots(TOTAL);
          msg.textContent = '✓ ' + wizardName + ' enregistré(e) avec ' + TOTAL + ' profils !';
          msg.className = 'status-msg success';
          document.getElementById('nameInput').value = '';
          loadFaces();
          setTimeout(cancelWizard, 2500);
        } else {
          currentStep++;
          runStep();
        }
      })
      .catch(function() {
        msg.textContent = 'Erreur réseau — réessai dans 2s';
        msg.className = 'status-msg error';
        setTimeout(startCountdown, 2000);
      });
    }

    function cancelWizard() {
      clearInterval(countdownTimer);
      document.getElementById('wizardStep').classList.add('hidden');
      document.getElementById('formStep').classList.remove('hidden');
      document.getElementById('wizardMsg').textContent = '';
    }

    // ── Face list ──
    function loadFaces() {
      fetch('/faces')
      .then(function(r) { return r.json(); })
      .then(function(faces) {
        var list = document.getElementById('faceList');
        var badge = document.getElementById('faceCount');
        badge.textContent = faces.length + ' personne' + (faces.length > 1 ? 's' : '');
        list.innerHTML = '';
        if (faces.length === 0) {
          list.innerHTML = '<li class="empty">Aucune personne enregistrée</li>';
          return;
        }
        faces.forEach(function(item) {
          var li = document.createElement('li');
          li.innerHTML =
            '<span class="avatar">' + item.name.charAt(0).toUpperCase() + '</span>' +
            '<span class="face-info">' +
              '<span class="face-name">' + item.name + '</span>' +
              '<span class="face-profiles">' + item.profiles + ' profil' + (item.profiles > 1 ? 's' : '') + '</span>' +
            '</span>' +
            '<button class="del-btn" onclick="deleteFace(\'' + item.name + '\')">✕</button>';
          list.appendChild(li);
        });
      });
    }

    function deleteFace(name) {
      if (!confirm('Supprimer ' + name + ' ?')) return;
      fetch('/delete_face/' + encodeURIComponent(name), { method: 'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function(data) { if (data.success) loadFaces(); });
    }

    // ── Threshold ──
    var slider = document.getElementById('thresholdSlider');
    slider.addEventListener('input', function() {
      document.getElementById('thresholdVal').textContent = parseFloat(slider.value).toFixed(2);
    });

    function applyThreshold() {
      var value = parseFloat(slider.value);
      var msg = document.getElementById('thresholdMsg');
      fetch('/threshold', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: value })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          msg.textContent = '✓ Seuil : ' + data.threshold.toFixed(2);
          msg.className = 'status-msg success';
        } else {
          msg.textContent = data.error || 'Erreur.';
          msg.className = 'status-msg error';
        }
      });
    }

    fetch('/threshold')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      slider.value = data.threshold;
      document.getElementById('thresholdVal').textContent = data.threshold.toFixed(2);
    });

    document.getElementById('nameInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') startWizard();
    });

    loadFaces();

    // ── Stats polling ──
    function refreshStats() {
      fetch('/stats')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('statIdentified').textContent = data.identified;
        document.getElementById('statUnknown').textContent    = data.unknown;
        document.getElementById('statTotal').textContent      = data.total;
      });
    }
    setInterval(refreshStats, 1000);
    refreshStats();
  </script>
</body>
</html>
