<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceID — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .bg-grid {
      background-image:
        linear-gradient(rgba(99,102,241,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow { box-shadow: 0 0 60px -10px rgba(99,102,241,.25); }
    .input-field {
      background: #0c0d15;
      border: 1px solid #2a2b3d;
      border-radius: .75rem;
      color: #e2e8f0;
      font-size: .875rem;
      outline: none;
      transition: border-color .15s;
      padding: .75rem 1rem;
      width: 100%;
    }
    .input-field:focus { border-color: #6366f1; }
    .input-field::placeholder { color: #475569; }
    .btn-login {
      width: 100%;
      padding: .75rem;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      font-weight: 600;
      font-size: .9rem;
      border-radius: .75rem;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body class="bg-[#0c0d15] bg-grid min-h-screen flex items-center justify-center p-4">

  <!-- Glow orbs -->
  <div class="fixed top-1/4 left-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="fixed bottom-1/4 right-1/4 w-80 h-80 bg-violet-600/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-sm relative">

    <!-- Card -->
    <div class="glow rounded-2xl border border-[#1e2035] bg-[#0f1020]/90 backdrop-blur-sm p-8">

      <!-- Logo -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center mb-4">
          <i data-lucide="scan-face" class="w-6 h-6 text-white"></i>
        </div>
        <h1 class="text-xl font-bold text-white">FaceID Dashboard</h1>
        <p class="text-slate-500 text-sm mt-1">Connectez-vous à votre espace</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="flex flex-col gap-4">

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Nom d'utilisateur</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600"></i>
            <input type="text" id="username" placeholder="admin" autocomplete="username"
              class="input-field pl-10" required>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Mot de passe</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600"></i>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
              class="input-field pl-10 pr-10" required>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-400 transition-colors">
              <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div id="errorMsg" class="hidden bg-red-950/50 border border-red-900/60 rounded-xl px-4 py-3 flex items-center gap-2">
          <i data-lucide="alert-circle" class="w-4 h-4 text-red-400 flex-shrink-0"></i>
          <span class="text-red-400 text-sm" id="errorText"></span>
        </div>

        <button type="submit" id="loginBtn" class="btn-login mt-2">
          <i data-lucide="log-in" class="w-4 h-4"></i>
          Se connecter
        </button>

      </form>

      <!-- Default credentials hint -->
      <div class="mt-6 p-3 rounded-xl bg-[#0c0d15] border border-[#1e2035] text-center">
        <p class="text-[11px] text-slate-600">Accès par défaut</p>
        <p class="text-xs text-slate-500 mt-1"><span class="text-indigo-400 font-mono">admin</span> / <span class="text-indigo-400 font-mono">admin123</span></p>
      </div>

    </div>

    <p class="text-center text-slate-700 text-xs mt-6">FaceID Dashboard · Reconnaissance Faciale</p>
  </div>

  <script>
    lucide.createIcons();

    function togglePwd() {
      var input = document.getElementById('password');
      var icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn  = document.getElementById('loginBtn');
      var err  = document.getElementById('errorMsg');
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg> Connexion...';
      err.classList.add('hidden');

      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
      .then(function(res) {
        if (res.ok && res.data.success) {
          window.location.href = '/';
        } else {
          document.getElementById('errorText').textContent = res.data.error || 'Erreur de connexion';
          err.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Se connecter';
        }
      })
      .catch(function() {
        document.getElementById('errorText').textContent = 'Erreur réseau';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Se connecter';
      });
    });
  </script>
</body>
</html>
